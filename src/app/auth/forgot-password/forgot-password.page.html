<app-auth-layout>
  <div class="auth-simple" *ngIf="!showSuccess">
    <h2 class="page-heading">Forgot password?</h2>
    <p class="page-sub">Enter your email and we will send reset instructions.</p>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <ion-item class="clinic-input" lines="full">
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" formControlName="email" autocomplete="email"></ion-input>
      </ion-item>
      <div class="form-error-message" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
        Valid email required
      </div>
      <button class="btn-primary wide" type="submit" [disabled]="submitting">Send reset link</button>
    </form>
    <p class="hint"><a routerLink="/auth/login">Back to login</a></p>
  </div>

  <div class="auth-simple success" *ngIf="showSuccess">
    <div class="success-icon-wrap">
      <ion-icon name="checkmark-circle" color="success"></ion-icon>
    </div>
    <h2 class="page-heading">Check your email</h2>
    <p class="page-sub">We have sent a password reset link to {{ submittedEmail }}.</p>
    <a routerLink="/auth/login" class="btn-primary wide link-btn">Back to login</a>
  </div>
</app-auth-layout>
